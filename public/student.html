<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Portal - GraphExam</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="nav-bar">
      <h2>GraphExam | Student: <span id="studentName"></span></h2>
      <button class="btn" onclick="logout()">Logout</button>
    </div>

    <div class="timer" id="timerDisplay">60s</div>

    <div class="student-dashboard">
      <div class="questions-panel glass-panel">
        <h3>Graph Questions</h3>
        <div id="questionsContainer">Loading questions...</div>
      </div>

      <div class="graph-panel glass-panel">
        <h3>Live Graph View</h3>
        <p style="color:var(--text-muted); font-size: 0.9rem;">Visualizing vertices (Time, Student, Questions) and edges (Submissions)</p>
        <div id="cy"></div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const studentId = localStorage.getItem('studentId');
    if (!studentId) window.location.href = '/';
    document.getElementById('studentName').innerText = studentId;

    let cy = cytoscape({
      container: document.getElementById('cy'),
      style: [
        { selector: 'node', style: { 'label': 'data(label)', 'background-color': '#3b82f6', 'color': '#fff', 'text-valign': 'center', 'text-halign': 'center', 'font-size': '12px', 'width': 40, 'height': 40 }},
        { selector: 'node[type="time"]', style: { 'background-color': '#eab308' }},
        { selector: 'node[type="student"]', style: { 'background-color': '#a855f7' }},
        { selector: 'node[type="question"]', style: { 'background-color': '#10b981', 'shape': 'rectangle', 'width': 'label', 'padding': '10px' }},
        { selector: 'node[type="option"]', style: { 'background-color': '#64748b', 'width': 20, 'height': 20 }},
        { selector: 'node[type="submission"]', style: { 'background-color': '#f43f5e', 'shape': 'diamond' }},
        { selector: 'edge', style: { 'width': 2, 'line-color': '#cbd5e1', 'target-arrow-color': '#cbd5e1', 'target-arrow-shape': 'triangle', 'curve-style': 'bezier', 'label': 'data(label)', 'font-size': '10px', 'color': '#fff', 'text-background-color': '#000', 'text-background-opacity': 0.5 }},
        { selector: 'edge[type="submits"]', style: { 'line-color': '#a855f7', 'target-arrow-color': '#a855f7' }},
        { selector: 'edge[type="answers"]', style: { 'line-color': '#10b981', 'target-arrow-color': '#10b981' }},
      ]
    });

    async function loadQuestions() {
      const res = await fetch('/api/questions');
      const questions = await res.json();
      const container = document.getElementById('questionsContainer');
      container.innerHTML = '';
      
      questions.forEach(q => {
        let optionsHtml = q.options.map(o => `
          <label class="option-label">
            <input type="radio" name="${q.id}" value="${o.id}">
            ${o.text}
          </label>
        `).join('');

        container.innerHTML += `
          <div class="question-card" id="card_${q.id}">
            <div class="question-title">${q.text}</div>
            ${optionsHtml}
            <button class="btn btn-submit" style="margin-top: 1rem; width: 100%;" onclick="submitAnswer('${q.id}')">Submit Answer</button>
          </div>
        `;
      });
    }

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.innerText = msg;
      t.className = `toast show ${type}`;
      setTimeout(() => t.className = 'toast', 3000);
    }

    async function submitAnswer(questionId) {
      const checked = document.querySelector(`input[name="${questionId}"]:checked`);
      if (!checked) return showToast('Please select an option first!', 'error');

      const res = await fetch('/api/submit', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ studentId, questionId, optionId: checked.value })
      });
      const data = await res.json();

      if (data.success) {
        showToast('Valid submission added to graph!', 'success');
        refreshGraph();
        document.querySelector(`#card_${questionId} button`).disabled = true;
      } else {
        showToast(`Graph Constraint Error: ${data.error}`, 'error');
      }
    }

    async function refreshGraph() {
      const res = await fetch('/api/graph');
      const data = await res.json();
      
      const elements = [];
      data.nodes.forEach(n => elements.push({ data: { id: n.id, type: n.type, label: n.type === 'student' ? n.data.name : (n.type==='question' ? 'Q' : (n.type==='time'? 'Time' : n.id)) } }));
      // Highlight the active student by filtering which submissions are shown. To keep simple, show all edges
      data.edges.forEach(e => elements.push({ data: { id: e.id, source: e.from, target: e.to, type: e.type, label: e.type } }));
      
      cy.elements().remove();
      cy.add(elements);
      cy.layout({ name: 'cose', padding: 20, animate: true, nodeRepulsion: 400000, idealEdgeLength: 50 }).run();
    }

    async function checkTime() {
       const res = await fetch('/api/time');
       const data = await res.json();
       const elapsed = data.now - data.start;
       let remaining = Math.max(0, Math.floor((data.duration - elapsed) / 1000));
       
       const timerDisplay = document.getElementById('timerDisplay');
       timerDisplay.innerText = `${remaining}s`;
       
       if (remaining <= 10 && remaining > 0) timerDisplay.classList.add('warning');
       else timerDisplay.classList.remove('warning');
       
       if (remaining <= 0) {
           timerDisplay.innerText = "TIME OVER";
           clearInterval(window.timerInt);
           // disable all submit buttons
           document.querySelectorAll('.btn-submit').forEach(b => b.disabled = true);
       }
    }

    function logout() {
      localStorage.removeItem('studentId');
      window.location.href = '/';
    }

    loadQuestions();
    refreshGraph();
    window.timerInt = setInterval(checkTime, 1000);
    setInterval(refreshGraph, 3000); // live graph updates
  </script>
</body>
</html>
