<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Portal - GraphExam</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .student-dashboard {
      display: flex;
      justify-content: center;
      height: auto;
    }
    .questions-panel {
      width: 100%;
      max-width: 800px;
    }
    .lockout-panel {
      text-align: center;
      padding: 4rem;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
    }
    .lockout-score {
      font-size: 3rem;
      font-weight: 800;
      color: var(--success);
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav-bar">
      <h2>GraphExam | Student: <span id="studentName"></span></h2>
      <button class="btn" onclick="logout()">Logout</button>
    </div>

    <div class="timer" id="timerDisplay">60s</div>

    <div class="student-dashboard" id="mainDashboard">
      <div class="questions-panel glass-panel" id="qPanel">
        <h3>Exam Questions</h3>
        <div id="questionsContainer">Loading questions...</div>
        <button class="btn btn-submit" style="margin-top: 2rem; width: 100%; padding: 1rem; font-size: 1.2rem;" onclick="submitAllAnswers()">Submit Entire Exam</button>
      </div>
      
      <div class="lockout-panel glass-panel" id="lockoutPanel" style="display: none;">
        <h2>Exam Completed</h2>
        <p style="color: var(--text-muted); font-size: 1.2rem;">You have already submitted your answers for this exam.</p>
        <div class="lockout-score" id="finalScoreDisplay"></div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const studentId = localStorage.getItem('studentId');
    if (!studentId) window.location.href = '/';
    document.getElementById('studentName').innerText = studentId;

    let totalQuestionsCount = 0;

    async function checkStatus() {
      const res = await fetch(`/api/student/status?id=${studentId}`);
      const status = await res.json();
      if (status.hasSubmitted) {
         showLockout(status.score);
         return true;
      }
      return false;
    }

    function showLockout(score) {
      document.getElementById('qPanel').style.display = 'none';
      document.getElementById('timerDisplay').style.display = 'none';
      const lockout = document.getElementById('lockoutPanel');
      lockout.style.display = 'block';
      if (score !== null && score !== undefined && totalQuestionsCount > 0) {
        document.getElementById('finalScoreDisplay').innerText = `Score: ${score} / ${totalQuestionsCount}`;
      } else if (score !== null) {
         // Hack to fetch total qs if it wasn't loaded 
         fetch('/api/questions').then(r=>r.json()).then(qs => {
             document.getElementById('finalScoreDisplay').innerText = `Score: ${score} / ${qs.length}`;
         });
      }
      clearInterval(window.timerInt);
    }

    async function loadQuestions() {
      if (await checkStatus()) return;

      const res = await fetch('/api/questions');
      const questions = await res.json();
      totalQuestionsCount = questions.length;
      
      const container = document.getElementById('questionsContainer');
      container.innerHTML = '';
      
      questions.forEach(q => {
        let optionsHtml = q.options.map(o => `
          <label class="option-label">
            <input type="radio" name="${q.id}" value="${o.id}">
            ${o.text}
          </label>
        `).join('');

        container.innerHTML += `
          <div class="question-card" id="card_${q.id}" data-qid="${q.id}">
            <div class="question-title">${q.text}</div>
            ${optionsHtml}
          </div>
        `;
      });
    }

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.innerText = msg;
      t.className = `toast show ${type}`;
      setTimeout(() => t.className = 'toast', 3000);
    }

    async function submitAllAnswers() {
      const cards = document.querySelectorAll('.question-card');
      let submissions = [];
      
      cards.forEach(card => {
        const qid = card.getAttribute('data-qid');
        const checked = card.querySelector(`input[name="${qid}"]:checked`);
        if (checked) {
          submissions.push({ questionId: qid, optionId: checked.value });
        }
      });
      
      const res = await fetch('/api/submit-all', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ studentId, submissions })
      });
      const data = await res.json();

      if (data.success) {
        showToast('Exam submitted successfully!', 'success');
        checkStatus(); 
      } else {
        showToast(`Submission Error: ${data.error}`, 'error');
      }
    }

    async function checkTime() {
       const res = await fetch('/api/time');
       const data = await res.json();
       const elapsed = data.now - data.start;
       let remaining = Math.max(0, Math.floor((data.duration - elapsed) / 1000));
       
       if (document.getElementById('lockoutPanel').style.display === 'block') {
         return; 
       }

       const timerDisplay = document.getElementById('timerDisplay');
       timerDisplay.innerText = `${remaining}s`;
       
       if (remaining <= 10 && remaining > 0) timerDisplay.classList.add('warning');
       else timerDisplay.classList.remove('warning');
       
       if (remaining <= 0) {
           timerDisplay.innerText = "TIME OVER";
           clearInterval(window.timerInt);
           submitAllAnswers(); 
       }
    }

    function logout() {
      localStorage.removeItem('studentId');
      window.location.href = '/';
    }

    loadQuestions();
    window.timerInt = setInterval(checkTime, 1000);
  </script>
</body>
</html>
